name: Tuno
options:
  bundleIdPrefix: no.tuno
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 3VD2DMBJ6M
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 106

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk.git
    from: "9.0.0"
  GooglePlaces:
    url: https://github.com/googlemaps/ios-places-sdk.git
    from: "10.0.0"
  Stripe:
    url: https://github.com/stripe/stripe-ios-spm.git
    from: "24.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.5.0"

schemes:
  Tuno:
    build:
      targets:
        Tuno: all
    run:
      config: Debug
      disableMainThreadChecker: true
      diagnosticOptions:
        mainThreadChecker: false

targets:
  Tuno:
    type: application
    platform: iOS
    sources:
      - path: Tuno
        excludes:
          - "Resources/**/README.md"
    entitlements:
      path: Tuno/Tuno.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.in-app-payments:
          - merchant.no.tuno.app
        com.apple.developer.associated-domains:
          - applinks:tuno.no
          - applinks:www.tuno.no
        aps-environment: production
    settings:
      base:
        INFOPLIST_FILE: Tuno/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: no.tuno.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Tuno/Tuno.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleMaps
        product: GoogleMaps
      - package: GooglePlaces
        product: GooglePlaces
      - package: Stripe
        product: StripeApplePay
      - package: Stripe
        product: StripePaymentsUI
      - package: Lottie
        product: Lottie
    info:
      path: Tuno/Info.plist
      properties:
        CFBundleDisplayName: Tuno
        CFBundleName: Tuno
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: nb
        CFBundleLocalizations:
          - nb
          - en
          - de
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Tuno trenger tilgang til posisjonen din for å vise parkerings- og campingplasser i nærheten."
        NSCameraUsageDescription: "Tuno bruker kameraet til å ta bilder av legitimasjon under Stripe-onboarding for utleiere."
        NSPhotoLibraryUsageDescription: "Tuno trenger tilgang til bildebiblioteket ditt for å laste opp profilbilde og bilder av plassene dine."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - no.tuno.app
            CFBundleURLName: no.tuno.app
