name: Tuno
options:
  bundleIdPrefix: no.tuno
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 3VD2DMBJ6M
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk.git
    from: "9.0.0"
  GooglePlaces:
    url: https://github.com/googlemaps/ios-places-sdk.git
    from: "10.0.0"
  Stripe:
    url: https://github.com/stripe/stripe-ios-spm.git
    from: "24.0.0"

targets:
  Tuno:
    type: application
    platform: iOS
    sources:
      - Tuno
    entitlements:
      path: Tuno/Tuno.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.in-app-payments:
          - merchant.no.tuno.app
    settings:
      base:
        INFOPLIST_FILE: Tuno/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: no.tuno.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Tuno/Tuno.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleMaps
        product: GoogleMaps
      - package: GooglePlaces
        product: GooglePlaces
      - package: Stripe
        product: StripeApplePay
      - package: Stripe
        product: StripePaymentsUI
    info:
      path: Tuno/Info.plist
      properties:
        CFBundleDisplayName: Tuno
        CFBundleName: Tuno
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Tuno trenger tilgang til posisjonen din for å vise parkerings- og campingplasser i nærheten."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - no.tuno.app
            CFBundleURLName: no.tuno.app
