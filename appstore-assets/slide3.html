<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');

  body {
    width: 1290px;
    height: 2796px;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(165deg, #46C185 0%, #3AB878 40%, #1E8F5A 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.10);
  }
  .c1 { width: 800px; height: 800px; bottom: -200px; right: -300px; }
  .c2 { width: 500px; height: 500px; top: -100px; left: -200px; }

  .text-area {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 180px 100px 60px;
  }

  .logo {
    font-size: 72px;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    letter-spacing: -1px;
    margin-bottom: 40px;
  }

  h1 {
    font-size: 96px;
    font-weight: 800;
    color: white;
    line-height: 1.12;
    letter-spacing: -3px;
    margin-bottom: 32px;
  }

  .subtitle {
    font-size: 42px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }

  .phone-frame {
    position: relative;
    z-index: 3;
    margin-top: 40px;
    width: 380px;
    height: 820px;
    border-radius: 52px;
    background: #000;
    padding: 12px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
  }

  .phone-frame img {
    width: 100%;
    height: 100%;
    border-radius: 42px;
    object-fit: cover;
    display: block;
  }

  .phone-notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 36px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 5;
  }
</style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>

  <div class="text-area">
    <div class="logo">tuno</div>
    <h1>Book med ett trykk</h1>
    <p class="subtitle">Se detaljer, fasiliteter og<br>bestill direkte i appen</p>
  </div>

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <img src="screen3.png" alt="Tuno annonse">
  </div>
</body>
</html>
